# wrangler.toml — Cloudflare Pages 設定
# ローカル開発: npx wrangler pages dev ./
# 手動デプロイ: npx wrangler pages deploy ./ --project-name microbiz-lab

name = "microbiz-lab"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Pages Functions はリポジトリルートの functions/ を自動認識する
# GitHub Actions からデプロイする場合は API_BASE をフロントに設定:
# https://microbiz-lab.pages.dev

[vars]
# 非シークレット環境変数（Cloudflare Dashboard からも設定可）
FIREBASE_URL = "https://microbiz-lab-default-rtdb.firebaseio.com"
SUPABASE_URL = "https://your-project.supabase.co"
# SUPABASE_KEY と FIREBASE_TOKEN はシークレットのため .env または GitHub Secrets で管理

# ローカル開発用 .dev.vars ファイルに書く（.gitignore に追加）:
# FIREBASE_URL=https://...
# SUPABASE_URL=https://...
# SUPABASE_KEY=your-key
